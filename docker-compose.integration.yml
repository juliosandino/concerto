services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: concerto
      POSTGRES_PASSWORD: concerto
      POSTGRES_DB: concerto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concerto"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - integration

  test-runner:
    build:
      context: .
      dockerfile: packages/integration-tests/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - test-results:/results
    environment:
      DATABASE_URL:
      TERM: xterm-256color
      COLORTERM: truecolor
      CONCERTO_WS_HOST: "0.0.0.0"
      CONCERTO_WS_PORT: "8000"
    networks:
      - integration

volumes:
  test-results:

networks:
  integration:
