[tox]
requires = tox-uv
envlist = pytest, black_checker, isort_checker, flake8, pylint, docformatter_checker
skip_missing_interpreters = true

[testenv]
basepython = python3.12

[testenv:pytest]
description = Run the full test suite with pytest
skip_install = true
deps =
    pytest
    pytest-asyncio
    pytest-cov
    pytest-httpx
    httpx
    -e packages/shared
    -e packages/controller
    -e packages/agent
    -e packages/mcp
commands =
    pytest --cov=packages --cov-report=xml --cov-report=term {posargs}

[testenv:docformatter]
description = Format docstrings with docformatter
skip_install = true
deps = docformatter
commands = docformatter --config pyproject.toml --recursive --in-place packages/

[testenv:docformatter_checker]
description = Verify docstrings are formatted with docformatter
skip_install = true
deps = docformatter
commands = docformatter --config pyproject.toml --recursive --check --diff packages/

[testenv:black]
description = Format code with black
skip_install = true
deps = black
commands = black packages/

[testenv:black_checker]
description = Verify code is formatted with black
skip_install = true
deps = black
commands = black --check --diff packages/

[testenv:isort]
description = Sort imports with isort
skip_install = true
deps = isort
commands = isort packages/

[testenv:isort_checker]
description = Verify imports are sorted with isort
skip_install = true
deps = isort
commands = isort --check-only --diff packages/

[testenv:flake8]
description = Lint with flake8
skip_install = true
deps = flake8
commands = flake8 packages/

[testenv:pylint]
description = Lint with pylint
skip_install = true
deps =
    pylint
    fastapi
    sqlalchemy
    pydantic
    pydantic-settings
    websockets
    httpx
    loguru
    textual
    alembic
    asyncpg
commands = pylint packages/ --ignore=integration-tests

[flake8]
max-line-length = 120
exclude = .tox,__pycache__,.eggs,*.egg,build,dist

[isort]
profile = black

