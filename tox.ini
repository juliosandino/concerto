[tox]
requires = tox-uv
envlist = black_checker, isort_checker, flake8, pylint
skip_missing_interpreters = true

[testenv]
basepython = python3.12

[testenv:black]
description = Format code with black
skip_install = true
deps = black
commands = black packages/ tests/

[testenv:black_checker]
description = Verify code is formatted with black
skip_install = true
deps = black
commands = black --check --diff packages/ tests/

[testenv:isort]
description = Sort imports with isort
skip_install = true
deps = isort
commands = isort packages/ tests/

[testenv:isort_checker]
description = Verify imports are sorted with isort
skip_install = true
deps = isort
commands = isort --check-only --diff packages/ tests/

[testenv:flake8]
description = Lint with flake8
skip_install = true
deps = flake8
commands = flake8 packages/ tests/

[testenv:pylint]
description = Lint with pylint
skip_install = true
deps =
    pylint
    fastapi
    sqlalchemy
    pydantic
    pydantic-settings
    websockets
    httpx
    loguru
    textual
    alembic
    asyncpg
commands = pylint packages/ tests/

[flake8]
max-line-length = 120
exclude = .tox,__pycache__,.eggs,*.egg,build,dist

[isort]
profile = black
