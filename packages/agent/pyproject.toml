[project]
name = "concerto-agent"
version = "0.1.0"
description = "Testbed agent service for Concerto TSS"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "websockets>=13.0",
    "pydantic-settings>=2.0",
    "pyyaml>=6.0",
]

[project.scripts]
concerto-agent = "concerto_agent.main:main"

[tool.uv.sources]
concerto-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_agent"]
