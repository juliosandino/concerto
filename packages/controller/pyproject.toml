[project]
name = "concerto-controller"
version = "0.1.0"
description = "Controller/Scheduler service for Concerto TSS"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.13",
    "pydantic-settings>=2.0",
]

[project.scripts]
concerto-controller = "concerto_controller.main:run"
concerto-migrate = "concerto_controller.cli:migrate"
concerto-revision = "concerto_controller.cli:revision"
concerto-downgrade = "concerto_controller.cli:downgrade"

[tool.uv.sources]
concerto-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_controller"]
