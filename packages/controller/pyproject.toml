[project]
name = "concerto-controller"
version = "0.1.0"
description = "Controller/Scheduler service for Concerto TSS"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.13",
    "pydantic-settings>=2.0",
    "typer>=0.9",
    "fastmcp>=2.0",
    "websockets>=13.0",
]

[project.scripts]
concerto-controller = "concerto_controller.cli:main"

[tool.uv.sources]
concerto-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_controller"]
