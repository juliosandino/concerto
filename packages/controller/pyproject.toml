[project]
name = "concerto-controller"
version = "0.1.0"
description = "Controller/Scheduler service for Concerto TSS"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "pydantic-settings>=2.0",
    "textual>=1.0",
    "httpx>=0.27",
]

[project.scripts]
concerto-controller = "concerto_controller.main:run"
concerto-dashboard = "concerto_controller.dashboard.app:run"

[tool.uv.sources]
concerto-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_controller"]
