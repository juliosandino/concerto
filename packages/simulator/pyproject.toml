[project]
name = "concerto-simulator"
version = "0.1.0"
description = "Fleet simulator for Concerto TSS — spawns agents and queues jobs"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "concerto-agent",
    "websockets>=13.0",
    "typer>=0.9",
]

[project.scripts]
concerto-simulator = "concerto_simulator.cli:app"

[tool.uv.sources]
concerto-shared = { workspace = true }
concerto-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_simulator"]
