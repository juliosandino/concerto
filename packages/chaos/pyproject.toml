[project]
name = "concerto-chaos"
version = "0.1.0"
description = "Chaos simulator for Concerto TSS — spawns mock agents with failure profiles"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "concerto-agent",
    "httpx>=0.27",
    "websockets>=13.0",
]

[project.scripts]
concerto-chaos = "concerto_chaos.main:main"

[tool.uv.sources]
concerto-shared = { workspace = true }
concerto-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_chaos"]
