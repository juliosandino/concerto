[project]
name = "concerto-mcp"
version = "0.1.0"
description = "MCP server for Concerto TSS — exposes controller REST API as MCP tools"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "fastmcp>=2.0",
    "httpx>=0.27",
    "typer>=0.9",
    "loguru>=0.7",
]

[project.scripts]
concerto-mcp = "concerto_mcp.cli:app"

[tool.uv.sources]
concerto-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_mcp"]
