[project]
name = "concerto-integration-tests"
version = "0.1.0"
description = "Integration tests for Concerto TSS"
requires-python = ">=3.12"
dependencies = [
    "concerto-controller",
    "concerto-agent",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "uvicorn[standard]>=0.30",
]

[tool.uv.sources]
concerto-controller = { workspace = true }
concerto-agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_integration_tests"]
