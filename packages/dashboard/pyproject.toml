[project]
name = "concerto-dashboard"
version = "0.1.0"
description = "TUI dashboard for Concerto TSS fleet visibility"
requires-python = ">=3.12"
dependencies = [
    "concerto-shared",
    "textual>=1.0",
    "websockets>=13.0",
    "loguru>=0.7",
    "typer>=0.9",
]

[project.scripts]
concerto-dashboard = "concerto_dashboard.cli:app"

[tool.uv.sources]
concerto-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_dashboard"]
