[project]
name = "concerto-shared"
version = "0.1.0"
description = "Shared models, enums, and message schemas for Concerto TSS"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "loguru>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/concerto_shared"]
